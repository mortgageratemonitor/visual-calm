<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Calm</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; width: 100vw; height: 100vh; cursor: none; }

  #three-canvas { position: fixed; inset: 0; width: 100%; height: 100%; }
  #kaleido-canvas { position: fixed; inset: 0; display: none; }

  #vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 52%, rgba(0,0,0,0.75) 100%);
    pointer-events: none; z-index: 2;
  }

  #scene-label {
    position: fixed; top: 38px; left: 50%; transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif; font-size: 11px; font-weight: 300;
    letter-spacing: 0.45em; color: rgba(255,255,255,0.3); text-transform: uppercase;
    z-index: 10; white-space: nowrap; pointer-events: none; transition: opacity 0.8s ease;
  }

  #ui {
    position: fixed; bottom: 38px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 2px; z-index: 10;
    background: rgba(0,0,0,0.4); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px); padding: 10px 18px;
    border-radius: 100px; border: 1px solid rgba(255,255,255,0.07);
    transition: opacity 0.8s ease;
  }

  .mode-btn {
    font-family: 'Cormorant Garamond', serif; font-size: 12px; font-weight: 300;
    letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.35);
    background: none; border: none; padding: 7px 15px; border-radius: 100px;
    cursor: pointer; transition: color 0.4s ease, background 0.4s ease; white-space: nowrap;
  }
  .mode-btn:hover { color: rgba(255,255,255,0.75); }
  .mode-btn.active { color: rgba(255,255,255,0.95); background: rgba(255,255,255,0.11); }

  #cursor {
    position: fixed; width: 5px; height: 5px; background: rgba(255,255,255,0.5);
    border-radius: 50%; pointer-events: none; z-index: 100;
    transform: translate(-50%,-50%); transition: opacity 0.8s ease;
  }

  #pulse-toggle {
    position: fixed; bottom: 38px; right: 42px;
    font-family: 'Cormorant Garamond', serif; font-size: 10px; font-weight: 300;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: rgba(255,255,255,0.22); background: none; border: none;
    padding: 7px 13px; border-radius: 100px; cursor: pointer;
    display: none; align-items: center; gap: 7px;
    transition: color 0.4s ease, opacity 0.8s ease;
    z-index: 10; opacity: 0;
  }
  #pulse-toggle:hover { color: rgba(255,255,255,0.55); }
  #pulse-toggle .pip {
    width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
    background: rgba(255,255,255,0.2);
    transition: background 0.4s ease, box-shadow 0.4s ease;
  }
  #pulse-toggle.on .pip {
    background: rgba(160,120,255,0.85);
    box-shadow: 0 0 6px rgba(160,120,255,0.7);
  }
  #pulse-toggle.on { color: rgba(255,255,255,0.38); }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="vignette"></div>
<div id="scene-label">Warp</div>

<canvas id="three-canvas"></canvas>
<canvas id="kaleido-canvas"></canvas>

<div id="ui">
  <button class="mode-btn active" data-mode="warp">Warp</button>
  <button class="mode-btn" data-mode="blackhole">Black Hole</button>
  <button class="mode-btn" data-mode="kaleidoscope">Kaleidoscope</button>
  <button class="mode-btn" data-mode="forest">Forest Stream</button>
  <button class="mode-btn" data-mode="ocean">Deep Ocean</button>
  <button class="mode-btn" data-mode="aurora">Aurora</button>
  <button class="mode-btn" data-mode="sacred">Sacred Geometry</button>
</div>

<button id="pulse-toggle" class="on">
  <span class="pip"></span>pulse
</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// COSMIC CALM — v2
// ============================================================

const pulseToggleEl = document.getElementById('pulse-toggle');
let pulseEnabled = true;

pulseToggleEl.addEventListener('click', function() {
  pulseEnabled = !pulseEnabled;
  pulseToggleEl.classList.toggle('on', pulseEnabled);
  if (!pulseEnabled && md.pulsing) {
    md.pulsing = false;
    md.speed   = md.baseSpeed || 0.07;
  }
  // When turning pulse OFF, immediately scatter the extra stars into the visible field
  if (!pulseEnabled && md.lPos && md.STAR_COUNT && md.STAR_COUNT_PULSE) {
    const camZ  = md.camZ || 0;
    const range = md.STAR_RANGE || 700;
    for (let i = md.STAR_COUNT_PULSE; i < md.STAR_COUNT; i++) {
      const nx = (Math.random() - 0.5) * range;
      const ny = (Math.random() - 0.5) * range;
      const nz = camZ - Math.random() * range;
      md.lPos[i*6]   = nx; md.lPos[i*6+1] = ny; md.lPos[i*6+2] = nz;
      md.lPos[i*6+3] = nx; md.lPos[i*6+4] = ny; md.lPos[i*6+5] = nz;
    }
    if (md.starLines) md.starLines.geometry.attributes.position.needsUpdate = true;
  }
  revealUI();
});


const threeCanvas   = document.getElementById('three-canvas');
const kaleidoCanvas = document.getElementById('kaleido-canvas');
const kaleidoCtx    = kaleidoCanvas.getContext('2d');
const cursorEl      = document.getElementById('cursor');
const labelEl       = document.getElementById('scene-label');
const uiEl          = document.getElementById('ui');

const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 1);

let scene, camera;
let currentMode = 'warp';
let animId;
let md = {};
let mouseNX = 0, mouseNY = 0;
let kOff, kOffCtx;

const FRAME_MS = 1000 / 30;
let lastFrame  = 0;

let uiTimer;
function revealUI() {
  uiEl.style.opacity     = '1';
  labelEl.style.opacity  = '1';
  cursorEl.style.opacity = '1';
  if (currentMode === 'warp') pulseToggleEl.style.opacity = '1';
  clearTimeout(uiTimer);
  uiTimer = setTimeout(() => {
    uiEl.style.opacity     = '0';
    labelEl.style.opacity  = '0';
    cursorEl.style.opacity = '0';
    pulseToggleEl.style.opacity = '0';
  }, 3500);
}

// ============================================================
// EVENTS
// ============================================================

document.addEventListener('mousemove', e => {
  mouseNX = (e.clientX / window.innerWidth  - 0.5) * 2;
  mouseNY = (e.clientY / window.innerHeight - 0.5) * 2;
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
  revealUI();
});

window.addEventListener('resize', () => {
  const W = window.innerWidth, H = window.innerHeight;
  renderer.setSize(W, H);
  kaleidoCanvas.width  = W;
  kaleidoCanvas.height = H;
  if (kOff) {
    const sz = Math.floor(Math.min(W, H) * 0.62);
    kOff.width = sz; kOff.height = sz;
    kOffCtx = kOff.getContext('2d');
    kOffCtx.fillStyle = '#000';
    kOffCtx.fillRect(0, 0, sz, sz);
  }
  if (camera) { camera.aspect = W / H; camera.updateProjectionMatrix(); }
});

// ============================================================
// SCENE LIFECYCLE
// ============================================================

function createScene() {
  scene  = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 4000);
}

function disposeScene() {
  if (!scene) return;
  scene.traverse(obj => {
    obj.geometry?.dispose();
    if (obj.material) {
      const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
      mats.forEach(m => {
        Object.values(m).forEach(v => { if (v && v.isTexture) v.dispose(); });
        m.dispose();
      });
    }
  });
  scene.clear();
}

function switchMode(mode) {
  cancelAnimationFrame(animId);
  disposeScene();
  threeCanvas.style.display   = 'block';
  kaleidoCanvas.style.display = 'none';
  kOff = null; kOffCtx = null;
  renderer.setClearColor(0x000000, 1);
  createScene();
  currentMode = mode;
  md = {};

  const labels = { warp: 'Warp', blackhole: 'Black Hole', kaleidoscope: 'Kaleidoscope', forest: 'Forest Stream', ocean: 'Deep Ocean', aurora: 'Aurora', sacred: 'Sacred Geometry' };
  labelEl.textContent = labels[mode];

  // Show pulse toggle only in Warp mode
  if (mode === 'warp') {
    pulseToggleEl.style.display = 'flex';
  } else {
    pulseToggleEl.style.display = 'none';
    pulseToggleEl.style.opacity = '0';
  }

  ({ warp: initWarp, blackhole: initBlackHole, kaleidoscope: initKaleidoscope, forest: initForest, ocean: initOcean, aurora: initAurora, sacred: initSacred })[mode]();
  loop();
}

// ============================================================
// ANIMATION LOOP
// ============================================================

function loop(ts = 0) {
  animId = requestAnimationFrame(loop);
  const dt = ts - lastFrame;
  if (dt < FRAME_MS) return;
  lastFrame = ts - (dt % FRAME_MS);
  const t = ts * 0.001;

  if (currentMode === 'kaleidoscope') { updateKaleidoscope(t); return; }

  switch (currentMode) {
    case 'warp':      updateWarp(t);      break;
    case 'blackhole': updateBlackHole(t); break;
    case 'forest':    updateForest(t);    break;
    case 'ocean':     updateOcean(t);     break;
    case 'aurora':    updateAurora(t);    break;
    case 'sacred':    updateSacred(t);    break;
  }
  renderer.render(scene, camera);
}

// ============================================================
// MODE 1 — WARP  (upgraded: stretch, pulse, color, fog)
// ============================================================

function initWarp() {
  camera.position.set(0, 0, 0);
  camera.rotation.set(0, 0, 0);

  // [5] Deep blue-purple fog for tunnel depth
  scene.fog = new THREE.FogExp2(0x06001a, 0.0042);
  renderer.setClearColor(0x06001a, 1);

  // Tunnel rings
  const RING_COUNT   = 120;
  const RING_SPACING = 4.2;
  const rings = [];
  const ringHues = [];

  for (let i = 0; i < RING_COUNT; i++) {
    const hue = (200 + (i / RING_COUNT) * 180) % 360;
    ringHues.push(hue);
    const rad = 3.8 + Math.sin(i * 0.55) * 0.7;
    const geo = new THREE.TorusGeometry(rad, 0.045, 8, 90);
    const mat = new THREE.MeshBasicMaterial({
      color: new THREE.Color('hsl(' + hue + ', 95%, 68%)'),
      transparent: true, opacity: 0,
    });
    const ring = new THREE.Mesh(geo, mat);
    ring.position.z = -(i + 1) * RING_SPACING;
    scene.add(ring);
    rings.push(ring);
  }

  // [1] Stars as LineSegments — each star is a tail + head pair
  // [3] Stars carry color tinted toward tunnel hues
  // Full pool allocated upfront; activeStars controls how many are updated
  const STAR_COUNT       = 16000; // max pool
  const STAR_COUNT_PULSE =  7000; // active when pulse is ON
  const STAR_RANGE = 700;
  // Each star = 2 vertices (tail, head) × 3 floats
  const lPos    = new Float32Array(STAR_COUNT * 2 * 3);
  const lCol    = new Float32Array(STAR_COUNT * 2 * 3);
  const sSpeeds = new Float32Array(STAR_COUNT);
  const sAngles = new Float32Array(STAR_COUNT);

  for (let i = 0; i < STAR_COUNT; i++) {
    const x = (Math.random() - 0.5) * STAR_RANGE;
    const y = (Math.random() - 0.5) * STAR_RANGE;
    // Park inactive stars far out of view initially
    const z = i < STAR_COUNT_PULSE
      ? -Math.random() * STAR_RANGE
      : -STAR_RANGE * 5;
    // tail
    lPos[i*6]   = x; lPos[i*6+1] = y; lPos[i*6+2] = z;
    // head (same position initially — stretched in update)
    lPos[i*6+3] = x; lPos[i*6+4] = y; lPos[i*6+5] = z;

    sSpeeds[i] = 0.6 + Math.random() * 1.4;

    // Radial distance drives color: close to tunnel axis = warm ring hue, far = cool white
    const r   = Math.sqrt(x*x + y*y);
    const pct = Math.min(r / (STAR_RANGE * 0.4), 1);
    const hue = (200 + Math.random() * 160) % 360;
    sAngles[i] = hue;
    const c0 = new THREE.Color().setHSL(hue / 360, 0.9, 0.8);          // tail: vivid
    const c1 = new THREE.Color().setHSL(hue / 360, 0.4 * pct, 0.95);   // head: near-white
    lCol[i*6]   = c0.r; lCol[i*6+1] = c0.g; lCol[i*6+2] = c0.b;
    lCol[i*6+3] = c1.r; lCol[i*6+4] = c1.g; lCol[i*6+5] = c1.b;
  }

  const lGeo = new THREE.BufferGeometry();
  lGeo.setAttribute('position', new THREE.BufferAttribute(lPos, 3));
  lGeo.setAttribute('color',    new THREE.BufferAttribute(lCol, 3));
  const starLines = new THREE.LineSegments(lGeo, new THREE.LineBasicMaterial({
    vertexColors: true, transparent: true, opacity: 0.85, depthWrite: false,
    blending: THREE.AdditiveBlending,
  }));
  starLines.geometry.setDrawRange(0, STAR_COUNT_PULSE * 2);
  scene.add(starLines);

  md.rings      = rings;
  md.ringHues   = ringHues;
  md.RING_COUNT = RING_COUNT;
  md.RING_SPACE = RING_SPACING;
  md.camZ       = 0;
  md.baseSpeed  = 0.07;
  md.speed      = 0.07;
  md.starLines       = starLines;
  md.lPos            = lPos;
  md.lCol            = lCol;
  md.sSpeeds         = sSpeeds;
  md.sAngles         = sAngles;
  md.STAR_COUNT      = STAR_COUNT;
  md.STAR_COUNT_PULSE = STAR_COUNT_PULSE;
  md.STAR_RANGE      = STAR_RANGE;
  md.activeStars     = STAR_COUNT_PULSE; // start with pulse-on count
  // [2] Pulse state
  md.pulseTimer    = 0;
  md.pulseInterval = 9;   // seconds between surges
  md.pulsing       = false;
  md.pulseT        = 0;
}

function updateWarp(t) {
  const { rings, RING_COUNT, RING_SPACE, lPos, lCol, sSpeeds, sAngles, STAR_COUNT, STAR_RANGE } = md;
  const total = RING_COUNT * RING_SPACE;

  // [2] Speed pulse — every ~9s the scene surges then settles
  md.pulseTimer += 1 / 30;
  if (pulseEnabled && !md.pulsing && md.pulseTimer > md.pulseInterval) {
    md.pulsing = true;
    md.pulseT  = 0;
    md.pulseTimer = 0;
  }
  if (md.pulsing) {
    md.pulseT += 1 / 30;
    const surge = Math.sin(md.pulseT * Math.PI / 2.2); // rise then fall over ~2s
    md.speed = md.baseSpeed + surge * 0.28;
    if (md.pulseT > 2.2) { md.pulsing = false; md.speed = md.baseSpeed; }
  }

  md.camZ -= md.speed;
  camera.position.z = md.camZ;

  // Rings — compress radius slightly during pulse for cinematic squeeze
  const pulseScale = md.pulsing ? (1 - (md.speed - md.baseSpeed) * 0.4) : 1;
  rings.forEach(function(ring, idx) {
    if (ring.position.z > camera.position.z + 6) ring.position.z -= total;
    const dist = Math.abs(ring.position.z - camera.position.z);
    ring.rotation.z = t * 0.18 + idx * 0.04;
    ring.scale.setScalar(pulseScale);
    ring.material.opacity = dist < 3 ? (dist / 3) * 0.85
      : dist > 85 ? 0
      : 0.85 * (1 - (dist - 3) / 82);
  });

  // Sync activeStars to pulse state and tell Three.js how many to render
  md.activeStars = pulseEnabled ? md.STAR_COUNT_PULSE : md.STAR_COUNT;
  md.starLines.geometry.setDrawRange(0, md.activeStars * 2);

  // [1][3] Stretch stars into tails proportional to speed
  const stretchMult = 1 + (md.speed / md.baseSpeed - 1) * 3.5;
  const tailLen = md.speed * 14 * stretchMult;

  for (let i = 0; i < md.activeStars; i++) {
    const ti = i * 6;

    // Advance head position
    lPos[ti+5] += sSpeeds[i] * (md.speed / md.baseSpeed);

    // Tail trails behind head along z
    lPos[ti]   = lPos[ti+3];  // tail x = head x
    lPos[ti+1] = lPos[ti+4];  // tail y = head y
    lPos[ti+2] = lPos[ti+5] - tailLen; // tail z lags behind

    // Recycle when head passes camera
    if (lPos[ti+5] > camera.position.z + 12) {
      const nx = (Math.random() - 0.5) * md.STAR_RANGE;
      const ny = (Math.random() - 0.5) * md.STAR_RANGE;
      const nz = camera.position.z - md.STAR_RANGE;
      lPos[ti]   = nx; lPos[ti+1] = ny; lPos[ti+2] = nz;
      lPos[ti+3] = nx; lPos[ti+4] = ny; lPos[ti+5] = nz;

      // [3] Refresh color — tint toward nearest ring's hue
      const hue = sAngles[i];
      const r   = Math.sqrt(nx*nx + ny*ny);
      const pct = Math.min(r / (STAR_RANGE * 0.4), 1);
      const c0  = new THREE.Color().setHSL(hue / 360, 0.9, 0.78);
      const c1  = new THREE.Color().setHSL(hue / 360, 0.4 * pct, 0.96);
      lCol[ti]   = c0.r; lCol[ti+1] = c0.g; lCol[ti+2] = c0.b;
      lCol[ti+3] = c1.r; lCol[ti+4] = c1.g; lCol[ti+5] = c1.b;
    }
  }
  md.starLines.geometry.attributes.position.needsUpdate = true;
  md.starLines.geometry.attributes.color.needsUpdate    = true;

  camera.rotation.x += (-mouseNY * 0.06 - camera.rotation.x) * 0.04;
  camera.rotation.y += ( mouseNX * 0.06 - camera.rotation.y) * 0.04;
}

// ============================================================
// MODE 2 — BLACK HOLE (v2: photon ring, density variation, star distortion, camera breathe)
// ============================================================

function initBlackHole() {
  camera.position.set(0, 22, 52);
  camera.lookAt(0, 0, 0);
  scene.fog = new THREE.FogExp2(0x000005, 0.004);
  renderer.setClearColor(0x000005, 1);

  // [4] Background stars — stored so we can warp them
  const sCount = 6000;
  const sPos   = new Float32Array(sCount * 3);
  const sBase  = new Float32Array(sCount * 3); // undistorted positions
  for (let i = 0; i < sCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r     = 220 + Math.random() * 180;
    const x = r * Math.sin(phi) * Math.cos(theta);
    const y = r * Math.sin(phi) * Math.sin(theta);
    const z = r * Math.cos(phi);
    sPos[i*3]  = x; sPos[i*3+1]  = y; sPos[i*3+2]  = z;
    sBase[i*3] = x; sBase[i*3+1] = y; sBase[i*3+2] = z;
  }
  const sGeo = new THREE.BufferGeometry();
  sGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
  const starField = new THREE.Points(sGeo, new THREE.PointsMaterial({
    color: 0xffffff, size: 0.5, transparent: true, opacity: 0.7,
  }));
  scene.add(starField);

  // Event horizon — slightly larger, perfectly black
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(5.4, 48, 48),
    new THREE.MeshBasicMaterial({ color: 0x000000 })
  ));

  // [3] Accretion disk — density clumping via non-uniform angular distribution
  const dCount = 20000;
  const dPos   = new Float32Array(dCount * 3);
  const dCol   = new Float32Array(dCount * 3);
  const dPhase = new Float32Array(dCount); // per-particle orbit phase offset

  // Define 4 dense clump centers around the disk
  const clumps = [0, Math.PI * 0.5, Math.PI * 1.1, Math.PI * 1.7];

  for (let i = 0; i < dCount; i++) {
    // Bias angle toward clumps for density variation
    const clump = clumps[Math.floor(Math.random() * clumps.length)];
    const ang   = clump + (Math.random() - 0.5) * (Math.random() < 0.4 ? 0.5 : Math.PI * 2);
    const r     = 6.5 + Math.pow(Math.random(), 0.38) * 22;
    const ht    = (Math.random() - 0.5) * Math.max(0, 1.8 - (r - 6.5) / 7);

    dPos[i*3]   = Math.cos(ang) * r;
    dPos[i*3+1] = ht;
    dPos[i*3+2] = Math.sin(ang) * r;

    // Color: hot white-orange core → cooler red-purple outer
    const pct = (r - 6.5) / 22;
    const c   = new THREE.Color();
    if (pct < 0.15)      c.setHSL(0.08, 1.0, 0.95);  // near-white hot
    else if (pct < 0.4)  c.setHSL(0.06, 1.0, 0.80);  // orange
    else if (pct < 0.7)  c.setHSL(0.04, 0.95, 0.65); // deep orange-red
    else                 c.setHSL(0.75, 0.7, 0.45);   // purple outer fringe
    dCol[i*3] = c.r; dCol[i*3+1] = c.g; dCol[i*3+2] = c.b;
    dPhase[i] = Math.random() * Math.PI * 2;
  }

  const dGeo = new THREE.BufferGeometry();
  dGeo.setAttribute('position', new THREE.BufferAttribute(dPos, 3));
  dGeo.setAttribute('color',    new THREE.BufferAttribute(dCol, 3));
  const disk = new THREE.Points(dGeo, new THREE.PointsMaterial({
    size: 0.13, vertexColors: true, transparent: true, opacity: 0.88,
    depthWrite: false, blending: THREE.AdditiveBlending,
  }));
  scene.add(disk);

  // [1] Photon ring — Einstein ring, thin bright arc around event horizon
  // Built as a tight torus very close to the horizon
  const photonRing = new THREE.Mesh(
    new THREE.TorusGeometry(5.55, 0.18, 12, 180),
    new THREE.MeshBasicMaterial({
      color: 0xfff4cc, transparent: true, opacity: 0.92,
      side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending,
    })
  );
  photonRing.rotation.x = Math.PI / 2;
  scene.add(photonRing);

  // Secondary fainter photon arc (slightly larger radius, off-axis tilt)
  const photonRing2 = new THREE.Mesh(
    new THREE.TorusGeometry(5.72, 0.09, 8, 160),
    new THREE.MeshBasicMaterial({
      color: 0xffaa55, transparent: true, opacity: 0.45,
      side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending,
    })
  );
  photonRing2.rotation.x = Math.PI / 2;
  photonRing2.rotation.z = 0.12;
  scene.add(photonRing2);

  // Inner glow halo (wider, softer)
  const halo = new THREE.Mesh(
    new THREE.TorusGeometry(5.9, 2.2, 16, 120),
    new THREE.MeshBasicMaterial({
      color: 0xff5500, transparent: true, opacity: 0.07,
      side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending,
    })
  );
  halo.rotation.x = Math.PI / 2;
  scene.add(halo);

  md.disk        = disk;
  md.dPos        = dPos;
  md.dPhase      = dPhase;
  md.dCount      = dCount;
  md.photonRing  = photonRing;
  md.photonRing2 = photonRing2;
  md.starField   = starField;
  md.sPos        = sPos;
  md.sBase       = sBase;
  md.sCount      = sCount;
  md.orbitAngle  = 0;
  // [5] Camera breathe state
  md.breatheT    = 0;
  md.baseOrbitR  = 52;
  md.baseOrbitY  = 22;
}

function updateBlackHole(t) {
  // [5] Camera breathe — slow drift toward/away over ~28s cycle
  md.breatheT += 1 / 30;
  const breathe   = Math.sin(md.breatheT * Math.PI / 14); // full cycle = 28s
  const orbitR    = md.baseOrbitR + breathe * 14;          // 38 → 66 range
  const orbitY    = md.baseOrbitY + breathe * 6;
  // Fog deepens as we get closer
  const fogDensity = 0.004 + (1 - (orbitR - 38) / 28) * 0.004;
  scene.fog.density = fogDensity;

  // Orbit + mouse nudge
  md.orbitAngle += 0.0022;
  const a = md.orbitAngle;
  camera.position.set(
    Math.cos(a) * orbitR + mouseNX * 4,
    orbitY       + mouseNY * 5,
    Math.sin(a) * orbitR
  );
  camera.lookAt(0, 0, 0);

  // Disk rotation — inner particles orbit faster (differential rotation)
  md.disk.rotation.y = t * 0.08;

  // [3] Density wave — shimmer brightness clumps by pulsing opacity slightly
  md.disk.material.opacity = 0.82 + Math.sin(t * 0.35) * 0.1;

  // [1] Photon ring pulse — subtle brightness oscillation
  md.photonRing.material.opacity  = 0.85 + Math.sin(t * 0.6) * 0.1;
  md.photonRing2.material.opacity = 0.38 + Math.sin(t * 0.45 + 1.2) * 0.12;

  // [4] Star gravitational lensing — warp star positions toward event horizon
  const { sPos, sBase, sCount } = md;
  const LENS_RADIUS = 55; // stars within this radius get bent
  for (let i = 0; i < sCount; i++) {
    const bx = sBase[i*3], by = sBase[i*3+1], bz = sBase[i*3+2];
    const dist = Math.sqrt(bx*bx + by*by + bz*bz);
    const flatDist = Math.sqrt(bx*bx + bz*bz); // distance from vertical axis
    if (flatDist < LENS_RADIUS) {
      // Pull stars tangentially around the black hole — simulates light bending
      const warpStrength = Math.pow(1 - flatDist / LENS_RADIUS, 2.5) * 18;
      const ang = Math.atan2(bz, bx) + warpStrength / dist * 0.06;
      sPos[i*3]   = Math.cos(ang) * flatDist;
      sPos[i*3+1] = by + Math.sin(t * 0.15 + i * 0.01) * warpStrength * 0.08;
      sPos[i*3+2] = Math.sin(ang) * flatDist;
    } else {
      sPos[i*3] = bx; sPos[i*3+1] = by; sPos[i*3+2] = bz;
    }
  }
  md.starField.geometry.attributes.position.needsUpdate = true;
}

// ============================================================
// MODE 3 — KALEIDOSCOPE (v2: mouse reactive, lissajous, color modes, velocity spin)
// ============================================================

// Kaleidoscope state lives outside md so it persists across frames cleanly
let kState = {};

function initKaleidoscope() {
  threeCanvas.style.display   = 'none';
  kaleidoCanvas.style.display = 'block';
  kaleidoCanvas.width  = window.innerWidth;
  kaleidoCanvas.height = window.innerHeight;

  const sz = Math.floor(Math.min(window.innerWidth, window.innerHeight) * 0.62);
  kOff = document.createElement('canvas');
  kOff.width = sz; kOff.height = sz;
  kOffCtx = kOff.getContext('2d');
  kOffCtx.fillStyle = '#000';
  kOffCtx.fillRect(0, 0, sz, sz);

  // [1][5] Mouse tracking for rotation and velocity
  kState.mouseX     = 0; // raw -1 to 1
  kState.mouseY     = 0;
  kState.prevMouseX = 0;
  kState.velX       = 0; // velocity
  kState.spinOffset = 0; // accumulated rotation from mouse X
  kState.spinMomentum = 0; // [5] velocity-driven spin

  // [2] Segment count — driven by mouse distance from center
  kState.segs     = 16;
  kState.targetSegs = 16;

  // [4] Color mode — cycles warm → full → cool → mono over 60s
  kState.colorPhase = 0;
}

function drawGeometricSource(t, zoom) {
  if (!kOffCtx) return;
  const sz = kOff.width;
  const cx = sz / 2, cy = sz / 2;

  kOffCtx.fillStyle = 'rgba(0,0,0,0.030)';
  kOffCtx.fillRect(0, 0, sz, sz);

  // [4] Color mode: slow 60s cycle through warm, full-spectrum, cool, monochrome
  kState.colorPhase = (kState.colorPhase || 0) + 1 / (60 * 30);
  const cp    = kState.colorPhase % 1; // 0→1 over 60s
  let hueBase, sat, lightnessScale;
  if (cp < 0.25) {
    // Warm phase — oranges, reds, yellows
    hueBase = 20 + cp * 80; sat = '100%'; lightnessScale = 1;
  } else if (cp < 0.5) {
    // Full spectrum
    hueBase = t * 12; sat = '100%'; lightnessScale = 1;
  } else if (cp < 0.75) {
    // Cool phase — blues, cyans, purples
    hueBase = 180 + (cp - 0.5) * 120; sat = '90%'; lightnessScale = 0.9;
  } else {
    // Monochrome — desaturated silver/white
    hueBase = t * 4; sat = '20%'; lightnessScale = 1.1;
  }
  const hue  = hueBase % 360;
  const hue2 = (hue + 137) % 360;
  const hue3 = (hue + 274) % 360;

  // [1] Apply mouse-Y zoom to source canvas
  const scale = zoom || 1;
  kOffCtx.save();
  kOffCtx.translate(cx, cy);
  kOffCtx.scale(scale, scale);
  kOffCtx.translate(-cx, -cy);

  // Rotating polygon rings
  const polygons = [
    { sides: 6,  r: sz * (0.28 + Math.sin(t * 0.17) * 0.04), rot:  t * 0.21,  stroke: 'hsla(' + hue  + ',' + sat + ',' + (70 * lightnessScale) + '%,0.65)', lw: sz * 0.006 },
    { sides: 4,  r: sz * (0.20 + Math.cos(t * 0.23) * 0.03), rot: -t * 0.28,  stroke: 'hsla(' + hue2 + ',' + sat + ',' + (65 * lightnessScale) + '%,0.55)', lw: sz * 0.005 },
    { sides: 8,  r: sz * (0.35 + Math.sin(t * 0.13) * 0.05), rot:  t * 0.14,  stroke: 'hsla(' + hue3 + ',' + sat + ',' + (60 * lightnessScale) + '%,0.45)', lw: sz * 0.004 },
    { sides: 3,  r: sz * (0.14 + Math.cos(t * 0.31) * 0.02), rot:  t * 0.38,  stroke: 'hsla(' + hue  + ',' + sat + ',' + (80 * lightnessScale) + '%,0.50)', lw: sz * 0.004 },
    { sides: 12, r: sz * (0.42 + Math.sin(t * 0.09) * 0.06), rot: -t * 0.11,  stroke: 'hsla(' + hue2 + ',' + sat + ',' + (55 * lightnessScale) + '%,0.35)', lw: sz * 0.003 },
  ];

  polygons.forEach(function(p) {
    kOffCtx.save();
    kOffCtx.translate(cx, cy);
    kOffCtx.rotate(p.rot);
    kOffCtx.beginPath();
    for (let v = 0; v <= p.sides; v++) {
      const a = (v / p.sides) * Math.PI * 2 - Math.PI / 2;
      v === 0 ? kOffCtx.moveTo(Math.cos(a) * p.r, Math.sin(a) * p.r)
              : kOffCtx.lineTo(Math.cos(a) * p.r, Math.sin(a) * p.r);
    }
    kOffCtx.strokeStyle = p.stroke;
    kOffCtx.lineWidth   = p.lw;
    kOffCtx.stroke();
    kOffCtx.restore();
  });

  // [3] Lissajous / spirograph curves — never quite repeat
  const lissajous = [
    { A: sz*0.32, B: sz*0.28, a: 3, b: 2, delta: t * 0.18,        hue: hue,  alpha: 0.38 },
    { A: sz*0.22, B: sz*0.24, a: 5, b: 4, delta: t * 0.11 + 1.0,  hue: hue2, alpha: 0.30 },
    { A: sz*0.38, B: sz*0.20, a: 7, b: 6, delta: t * 0.07 + 2.1,  hue: hue3, alpha: 0.22 },
    { A: sz*0.18, B: sz*0.36, a: 4, b: 3, delta: t * 0.14 + 0.5,  hue: hue,  alpha: 0.28 },
  ];

  lissajous.forEach(function(lj) {
    kOffCtx.save();
    kOffCtx.translate(cx, cy);
    kOffCtx.beginPath();
    const steps = 220;
    for (let s = 0; s <= steps; s++) {
      const theta = (s / steps) * Math.PI * 2;
      const lx = lj.A * Math.sin(lj.a * theta + lj.delta);
      const ly = lj.B * Math.sin(lj.b * theta);
      s === 0 ? kOffCtx.moveTo(lx, ly) : kOffCtx.lineTo(lx, ly);
    }
    kOffCtx.strokeStyle = 'hsla(' + lj.hue + ',' + sat + ',72%,' + lj.alpha + ')';
    kOffCtx.lineWidth   = sz * 0.0035;
    kOffCtx.stroke();
    kOffCtx.restore();
  });

  // Orbiting mandala dots
  const orbits = [
    { count: 8,  orbitR: sz * 0.22, dotR: sz * 0.016, speed:  0.29, h: hue,  alpha: 0.75 },
    { count: 12, orbitR: sz * 0.31, dotR: sz * 0.010, speed: -0.19, h: hue2, alpha: 0.60 },
    { count: 6,  orbitR: sz * 0.16, dotR: sz * 0.013, speed:  0.41, h: hue3, alpha: 0.70 },
    { count: 16, orbitR: sz * 0.40, dotR: sz * 0.007, speed: -0.13, h: hue,  alpha: 0.45 },
  ];

  orbits.forEach(function(o) {
    for (let d = 0; d < o.count; d++) {
      const ang = (d / o.count) * Math.PI * 2 + t * o.speed;
      const dx  = cx + Math.cos(ang) * o.orbitR;
      const dy  = cy + Math.sin(ang) * o.orbitR;
      const g   = kOffCtx.createRadialGradient(dx, dy, 0, dx, dy, o.dotR);
      g.addColorStop(0,   'hsla(' + o.h + ',' + sat + ',90%,' + o.alpha + ')');
      g.addColorStop(0.5, 'hsla(' + ((o.h+40)%360) + ',' + sat + ',65%,' + (o.alpha * 0.5) + ')');
      g.addColorStop(1,   'hsla(' + o.h + ',' + sat + ',50%,0)');
      kOffCtx.beginPath();
      kOffCtx.arc(dx, dy, o.dotR, 0, Math.PI * 2);
      kOffCtx.fillStyle = g;
      kOffCtx.fill();
    }
  });

  // Laser lines from center
  for (let l = 0; l < 7; l++) {
    const a   = (l / 7) * Math.PI * 2 + t * 0.09;
    const len = sz * (0.38 + Math.sin(t * 0.22 + l) * 0.06);
    const lh  = (hue + l * 51) % 360;
    kOffCtx.save();
    kOffCtx.translate(cx, cy);
    kOffCtx.rotate(a);
    const lg = kOffCtx.createLinearGradient(0, 0, len, 0);
    lg.addColorStop(0,   'hsla(' + lh + ',' + sat + ',85%,0.55)');
    lg.addColorStop(0.6, 'hsla(' + lh + ',' + sat + ',60%,0.22)');
    lg.addColorStop(1,   'hsla(' + lh + ',' + sat + ',50%,0)');
    kOffCtx.beginPath();
    kOffCtx.moveTo(0, 0);
    kOffCtx.lineTo(len, 0);
    kOffCtx.strokeStyle = lg;
    kOffCtx.lineWidth   = sz * 0.003;
    kOffCtx.stroke();
    kOffCtx.restore();
  }

  // Pulsing center bloom
  const bloomR = sz * (0.07 + Math.sin(t * 0.55) * 0.025);
  const bloom  = kOffCtx.createRadialGradient(cx, cy, 0, cx, cy, bloomR);
  bloom.addColorStop(0,   'hsla(' + hue  + ',' + sat + ',98%,0.9)');
  bloom.addColorStop(0.4, 'hsla(' + hue2 + ',' + sat + ',70%,0.5)');
  bloom.addColorStop(1,   'hsla(' + hue3 + ',' + sat + ',50%,0)');
  kOffCtx.beginPath();
  kOffCtx.arc(cx, cy, bloomR, 0, Math.PI * 2);
  kOffCtx.fillStyle = bloom;
  kOffCtx.fill();

  kOffCtx.restore(); // end zoom transform
}

function updateKaleidoscope(t) {
  if (!kOffCtx) return;
  const W  = kaleidoCanvas.width, H = kaleidoCanvas.height;
  const cx = W / 2, cy = H / 2;
  const R  = Math.min(cx, cy) * 0.985;

  // [5] Mouse velocity drives spin momentum
  kState.velX       = mouseNX - kState.prevMouseX;
  kState.prevMouseX = mouseNX;
  kState.spinMomentum += kState.velX * 0.18;
  kState.spinMomentum *= 0.92; // friction — momentum decays naturally
  kState.spinOffset   += kState.spinMomentum;

  // [1] Mouse X = rotation offset, Mouse Y = zoom (0.7 → 1.4)
  const mouseRotation = kState.spinOffset;
  const zoom = 0.7 + (1 - mouseNY) * 0.5 * 0.7; // mouseNY -1→1 maps to 1.4→0.7

  // [2] Segment count from mouse distance to center (clamped to even numbers 8→32)
  const mouseDist  = Math.sqrt(mouseNX * mouseNX + mouseNY * mouseNY) / Math.SQRT2;
  const targetSegs = Math.round((8 + mouseDist * 24) / 2) * 2; // even only
  kState.segs += (targetSegs - kState.segs) * 0.06; // smooth interpolation
  const SEGS  = Math.max(8, Math.min(32, Math.round(kState.segs / 2) * 2));
  const sAng  = (Math.PI * 2) / SEGS;

  drawGeometricSource(t, zoom);

  const ctx = kaleidoCtx;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.translate(cx, cy);

  // [1] Apply mouse-X rotation to entire kaleidoscope
  ctx.rotate(mouseRotation + t * 0.008);

  for (let i = 0; i < SEGS; i++) {
    ctx.save();
    ctx.rotate(sAng * i);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, R, -sAng / 2, sAng / 2);
    ctx.closePath();
    ctx.clip();
    if (i % 2 === 0) {
      ctx.drawImage(kOff, -R, -R, R * 2, R * 2);
    } else {
      ctx.scale(-1, 1);
      ctx.drawImage(kOff, -R, -R, R * 2, R * 2);
    }
    ctx.restore();
  }

  // Dark framing ring
  ctx.beginPath();
  ctx.arc(0, 0, R, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,0,0,0.6)';
  ctx.lineWidth   = 4;
  ctx.stroke();

  ctx.restore();
}

function initForest() {
  camera.position.set(0, 1.2, 0);
  camera.rotation.set(0, 0, 0);
  scene.fog = new THREE.FogExp2(0x04150b, 0.015);
  renderer.setClearColor(0x04150b, 1);

  // Background sphere
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(600, 16, 16),
    new THREE.MeshBasicMaterial({ color: 0x010a04, side: THREE.BackSide })
  ));

  // [3] Ambient color grading overlay — green-teal tint plane facing camera
  const gradGeo = new THREE.PlaneGeometry(200, 200);
  const gradMat = new THREE.MeshBasicMaterial({
    color: 0x062212, transparent: true, opacity: 0.18,
    depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
  });
  const gradPlane = new THREE.Mesh(gradGeo, gradMat);
  gradPlane.position.set(0, 0, -5);
  scene.add(gradPlane);

  // [4] Low-lying ground mist plane — hugs water surface
  const mistGeo = new THREE.PlaneGeometry(40, 130, 1, 1);
  mistGeo.rotateX(-Math.PI / 2);
  const mistMat = new THREE.MeshBasicMaterial({
    color: 0x8ecfb0, transparent: true, opacity: 0.09,
    depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
  });
  const mistMesh = new THREE.Mesh(mistGeo, mistMat);
  mistMesh.position.set(0, -1.6, -60);
  scene.add(mistMesh);

  // Second thicker mist layer right at waterline
  const mist2Geo = new THREE.PlaneGeometry(35, 130, 1, 1);
  mist2Geo.rotateX(-Math.PI / 2);
  const mist2Mat = new THREE.MeshBasicMaterial({
    color: 0x5ab898, transparent: true, opacity: 0.06,
    depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
  });
  const mist2Mesh = new THREE.Mesh(mist2Geo, mist2Mat);
  mist2Mesh.position.set(0, -2.05, -60);
  scene.add(mist2Mesh);

  // [1] Water surface — subdivided for ripples
  const WATER_W = 30, WATER_D = 130, WS_W = 44, WS_D = 88;
  const waterGeo = new THREE.PlaneGeometry(WATER_W, WATER_D, WS_W, WS_D);
  waterGeo.rotateX(-Math.PI / 2);
  const waterBase = new Float32Array(waterGeo.attributes.position.array.length);
  waterBase.set(waterGeo.attributes.position.array);
  const waterMat = new THREE.MeshBasicMaterial({
    color: 0x0d4535, transparent: true, opacity: 0.78,
    side: THREE.DoubleSide, depthWrite: false,
  });
  const waterMesh = new THREE.Mesh(waterGeo, waterMat);
  waterMesh.position.set(0, -2.2, -60);
  scene.add(waterMesh);

  // [1] Reflection layer — flipped additive copy of ambient color, tinted
  const reflGeo = new THREE.PlaneGeometry(WATER_W, WATER_D, WS_W, WS_D);
  reflGeo.rotateX(-Math.PI / 2);
  const reflBase = new Float32Array(reflGeo.attributes.position.array.length);
  reflBase.set(reflGeo.attributes.position.array);
  const reflMat = new THREE.MeshBasicMaterial({
    color: 0x1a6644, transparent: true, opacity: 0.22,
    side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending,
  });
  const reflMesh = new THREE.Mesh(reflGeo, reflMat);
  reflMesh.position.set(0, -2.18, -60);
  scene.add(reflMesh);

  // Shimmer glint layer
  const shimmerGeo = new THREE.PlaneGeometry(WATER_W, WATER_D, WS_W, WS_D);
  shimmerGeo.rotateX(-Math.PI / 2);
  const shimmerMat = new THREE.MeshBasicMaterial({
    color: 0x22aa77, transparent: true, opacity: 0.14,
    side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending,
  });
  const shimmerMesh = new THREE.Mesh(shimmerGeo, shimmerMat);
  shimmerMesh.position.set(0, -2.14, -60);
  scene.add(shimmerMesh);

  // [5] Ripple ring pool — pre-allocate 12 rings as torus meshes
  const rippleRings = [];
  for (let r = 0; r < 12; r++) {
    const rGeo = new THREE.TorusGeometry(0.1, 0.025, 4, 28);
    const rMat = new THREE.MeshBasicMaterial({
      color: 0x55ddaa, transparent: true, opacity: 0,
      depthWrite: false, blending: THREE.AdditiveBlending,
    });
    const rMesh = new THREE.Mesh(rGeo, rMat);
    rMesh.rotation.x = Math.PI / 2;
    rMesh.position.set(
      (Math.random() - 0.5) * 22, -2.18,
      -(5 + Math.random() * 55)
    );
    scene.add(rMesh);
    rippleRings.push({
      mesh: rMesh,
      active: false,
      age: 0,
      maxAge: 2.2 + Math.random() * 1.2,
      baseX: (Math.random() - 0.5) * 22,
      baseZ: -(5 + Math.random() * 55),
      nextSpawn: Math.random() * 4,
    });
  }

  // Caustic light blobs
  const CAUSTICS = 42;
  const cPos = new Float32Array(CAUSTICS * 3);
  const cCol = new Float32Array(CAUSTICS * 3);
  const cData = [];
  for (let i = 0; i < CAUSTICS; i++) {
    const x = (Math.random() - 0.5) * WATER_W * 0.85;
    const z = -(5 + Math.random() * (WATER_D - 10));
    cPos[i*3] = x; cPos[i*3+1] = -2.1; cPos[i*3+2] = z;
    const bright = 0.65 + Math.random() * 0.35;
    cCol[i*3] = bright * 0.25; cCol[i*3+1] = bright * 0.88; cCol[i*3+2] = bright * 0.55;
    cData.push({ baseX: x, baseZ: z, phase: Math.random() * Math.PI * 2, freq: 0.35 + Math.random() * 0.5 });
  }
  const cGeo = new THREE.BufferGeometry();
  cGeo.setAttribute('position', new THREE.BufferAttribute(cPos, 3));
  cGeo.setAttribute('color',    new THREE.BufferAttribute(cCol, 3));
  const caustics = new THREE.Points(cGeo, new THREE.PointsMaterial({
    size: 0.6, vertexColors: true, transparent: true, opacity: 0,
    depthWrite: false, blending: THREE.AdditiveBlending,
  }));
  scene.add(caustics);

  // Canopy leaf planes overhead
  const canopyShapes = [];
  for (let i = 0; i < 36; i++) {
    const w = 3.5 + Math.random() * 7;
    const h = 1.4 + Math.random() * 3;
    const geo = new THREE.PlaneGeometry(w, h);
    const mat = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(0.33, 0.45, 0.035 + Math.random() * 0.045),
      transparent: true, opacity: 0.85 + Math.random() * 0.12, side: THREE.DoubleSide,
    });
    const leaf = new THREE.Mesh(geo, mat);
    leaf.position.set((Math.random() - 0.5) * 26, 5.5 + Math.random() * 6, -(2 + Math.random() * 68));
    leaf.rotation.x = Math.PI / 2 + (Math.random() - 0.5) * 0.5;
    leaf.rotation.z = Math.random() * Math.PI;
    scene.add(leaf);
    canopyShapes.push({ mesh: leaf, phase: Math.random() * Math.PI * 2 });
  }

  // God-ray light shafts
  const shafts = [];
  for (let s = 0; s < 22; s++) {
    const h = 7 + Math.random() * 15;
    const geo = new THREE.CylinderGeometry(0.05, 0.55, h, 6, 1, true);
    const mat = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(0.30 + Math.random() * 0.08, 0.5, 0.58 + Math.random() * 0.2),
      transparent: true, opacity: 0,
      side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending,
    });
    const shaft = new THREE.Mesh(geo, mat);
    shaft.position.set((Math.random() - 0.5) * 24, 4 + Math.random() * 7, -(4 + Math.random() * 62));
    shaft.rotation.x = Math.PI;
    shaft.rotation.z = (Math.random() - 0.5) * 0.2;
    scene.add(shaft);
    shafts.push({ mesh: shaft, phase: Math.random() * Math.PI * 2, base: 0.05 + Math.random() * 0.09 });
  }

  // [2] 3D Tree geometry — tapered cylinder trunks + foliage sphere clusters
  const trees3D = [];
  for (let i = 0; i < 28; i++) {
    const side     = Math.random() < 0.5 ? -1 : 1;
    const baseX    = side * (4.5 + Math.random() * 13);
    const baseZ    = -(3 + Math.random() * 68);
    const trunkH   = 4 + Math.random() * 6;
    const trunkR   = 0.08 + Math.random() * 0.14;
    const darkness = 0.022 + Math.random() * 0.025;

    // Trunk
    const tGeo = new THREE.CylinderGeometry(trunkR * 0.5, trunkR, trunkH, 6);
    const tMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(0.07, 0.3, darkness),
    });
    const trunk = new THREE.Mesh(tGeo, tMat);
    trunk.position.set(baseX, trunkH / 2 - 2.2, baseZ);
    scene.add(trunk);

    // Foliage — 2-3 overlapping sphere clusters per tree
    const foliageGroup = [];
    const clusterCount = 2 + Math.floor(Math.random() * 2);
    for (let c = 0; c < clusterCount; c++) {
      const fR   = 0.7 + Math.random() * 1.1;
      const fGeo = new THREE.SphereGeometry(fR, 7, 6);
      const fMat = new THREE.MeshBasicMaterial({
        color: new THREE.Color().setHSL(0.32 + Math.random() * 0.06, 0.4, 0.03 + Math.random() * 0.04),
        transparent: true, opacity: 0.88 + Math.random() * 0.1,
      });
      const foliage = new THREE.Mesh(fGeo, fMat);
      foliage.position.set(
        baseX + (Math.random() - 0.5) * fR,
        trunkH - 2.2 + c * fR * 0.7 + fR * 0.5,
        baseZ + (Math.random() - 0.5) * fR * 0.6
      );
      scene.add(foliage);
      foliageGroup.push(foliage);
    }
    trees3D.push({ trunk, foliage: foliageGroup, baseZ });
  }

  // Fine dust
  const DUST = 3800;
  const dPos = new Float32Array(DUST * 3);
  const dCol = new Float32Array(DUST * 3);
  for (let i = 0; i < DUST; i++) {
    dPos[i*3]   = (Math.random() - 0.5) * 28;
    dPos[i*3+1] = -1 + Math.random() * 9;
    dPos[i*3+2] = -(Math.random() * 65);
    const b = 0.4 + Math.random() * 0.4;
    dCol[i*3] = b * 0.5; dCol[i*3+1] = b * 0.85; dCol[i*3+2] = b * 0.38;
  }
  const dGeo = new THREE.BufferGeometry();
  dGeo.setAttribute('position', new THREE.BufferAttribute(dPos, 3));
  dGeo.setAttribute('color',    new THREE.BufferAttribute(dCol, 3));
  const dust = new THREE.Points(dGeo, new THREE.PointsMaterial({
    size: 0.06, vertexColors: true, transparent: true, opacity: 0.42,
    depthWrite: false, blending: THREE.AdditiveBlending,
  }));
  scene.add(dust);

  // Glowing spores
  const SPORES = 300;
  const sPos = new Float32Array(SPORES * 3);
  const sCol = new Float32Array(SPORES * 3);
  const sData = [];
  for (let i = 0; i < SPORES; i++) {
    const x = (Math.random() - 0.5) * 22;
    const y = -0.5 + Math.random() * 7;
    const z = -(Math.random() * 62);
    sPos[i*3] = x; sPos[i*3+1] = y; sPos[i*3+2] = z;
    const hue = 0.27 + Math.random() * 0.14;
    const c = new THREE.Color().setHSL(hue, 0.9, 0.75);
    sCol[i*3] = c.r; sCol[i*3+1] = c.g; sCol[i*3+2] = c.b;
    sData.push({ phase: Math.random() * Math.PI * 2, drift: (Math.random() - 0.5) * 0.011 });
  }
  const sGeo = new THREE.BufferGeometry();
  sGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
  sGeo.setAttribute('color',    new THREE.BufferAttribute(sCol, 3));
  const spores = new THREE.Points(sGeo, new THREE.PointsMaterial({
    size: 0.26, vertexColors: true, transparent: true, opacity: 0,
    depthWrite: false, blending: THREE.AdditiveBlending,
  }));
  scene.add(spores);

  // Fireflies
  const FLIES = 150;
  const fPos = new Float32Array(FLIES * 3);
  const fCol = new Float32Array(FLIES * 3);
  for (let i = 0; i < FLIES; i++) {
    fPos[i*3]   = (Math.random() - 0.5) * 22;
    fPos[i*3+1] = -1.5 + Math.random() * 4.5;
    fPos[i*3+2] = -(2 + Math.random() * 55);
    fCol[i*3] = 0.75; fCol[i*3+1] = 1.0; fCol[i*3+2] = 0.25;
  }
  const fGeo = new THREE.BufferGeometry();
  fGeo.setAttribute('position', new THREE.BufferAttribute(fPos, 3));
  fGeo.setAttribute('color',    new THREE.BufferAttribute(fCol, 3));
  const flies = new THREE.Points(fGeo, new THREE.PointsMaterial({
    size: 0.2, vertexColors: true, transparent: true, opacity: 0,
    depthWrite: false, blending: THREE.AdditiveBlending,
  }));
  scene.add(flies);

  md.waterMesh   = waterMesh;  md.waterBase  = waterBase;
  md.reflMesh    = reflMesh;   md.reflBase   = reflBase;
  md.shimmerMesh = shimmerMesh;
  md.mistMesh    = mistMesh;   md.mist2Mesh  = mist2Mesh;
  md.gradPlane   = gradPlane;
  md.rippleRings = rippleRings;
  md.caustics    = caustics;   md.cPos = cPos; md.cData = cData; md.CAUSTICS = CAUSTICS;
  md.canopy      = canopyShapes;
  md.trees3D     = trees3D;
  md.dust        = dust;   md.dPos = dPos; md.DUST  = DUST;
  md.spores      = spores; md.sPos = sPos; md.sData = sData; md.SPORES = SPORES;
  md.flies       = flies;  md.fPos = fPos; md.FLIES = FLIES;
  md.shafts      = shafts;
  md.camZ        = 0;
  md.rippleTimer = 0;
  md.WATER_W     = WATER_W;
  md.WATER_D     = WATER_D;
}

function updateForest(t) {
  const { dPos, DUST, sPos, sData, SPORES, fPos, FLIES, shafts, cPos, cData, CAUSTICS } = md;
  const speed = 0.038;

  md.camZ -= speed;
  camera.position.z = md.camZ;
  camera.position.x += (mouseNX * 1.4 - camera.position.x) * 0.018;
  camera.position.y += (1.2 - mouseNY * 0.7 - camera.position.y) * 0.018;
  camera.lookAt(camera.position.x * 0.12, 0.2, camera.position.z - 10);

  // [3] Color grading plane follows camera
  md.gradPlane.position.set(camera.position.x, camera.position.y, camera.position.z - 5);
  md.gradPlane.lookAt(camera.position.x, camera.position.y, camera.position.z);
  // Pulse grading tint subtly with light shafts
  md.gradPlane.material.opacity = 0.14 + Math.sin(t * 0.22) * 0.04;

  // [1] Ripple water surface vertices
  const wPos3 = md.waterMesh.geometry.attributes.position.array;
  const wBase = md.waterBase;
  const rPos3 = md.reflMesh.geometry.attributes.position.array;
  const rBase = md.reflBase;
  const wCount = wPos3.length / 3;
  for (let i = 0; i < wCount; i++) {
    const bx = wBase[i*3], bz = wBase[i*3+2];
    const ripple = Math.sin(bx * 0.6 + t * 0.9) * 0.055
                 + Math.cos(bz * 0.45 + t * 0.7) * 0.04
                 + Math.sin((bx + bz) * 0.35 + t * 1.1) * 0.025;
    wPos3[i*3+1] = wBase[i*3+1] + ripple;
    // [1] Reflection layer mirrors ripple slightly offset
    rPos3[i*3+1] = rBase[i*3+1] + ripple * 0.6 + Math.sin(bx * 0.8 + t * 1.3) * 0.018;
  }
  md.waterMesh.geometry.attributes.position.needsUpdate = true;
  md.reflMesh.geometry.attributes.position.needsUpdate  = true;

  // [1] Reflection color pulses with shaft light — simulates reflected canopy light
  const reflPulse = 0.18 + Math.sin(t * 0.38) * 0.07;
  md.reflMesh.material.opacity = reflPulse;
  md.shimmerMesh.material.opacity = 0.10 + Math.sin(t * 1.9) * 0.06;

  // Scroll water planes forward
  [md.waterMesh, md.reflMesh, md.shimmerMesh].forEach(function(m) {
    m.position.z += speed * 1.1;
    if (m.position.z > camera.position.z + 8) m.position.z = camera.position.z - 120;
  });

  // [4] Ground mist planes scroll and pulse opacity
  md.mistMesh.position.z  += speed * 0.8;
  md.mist2Mesh.position.z += speed * 0.8;
  if (md.mistMesh.position.z > camera.position.z + 6) {
    md.mistMesh.position.z  = camera.position.z - 125;
    md.mist2Mesh.position.z = camera.position.z - 125;
  }
  md.mistMesh.material.opacity  = 0.07 + Math.sin(t * 0.19) * 0.025;
  md.mist2Mesh.material.opacity = 0.05 + Math.sin(t * 0.27 + 1) * 0.02;

  // [5] Ripple rings — spawn new rings periodically, animate outward
  md.rippleTimer += 1 / 30;
  md.rippleRings.forEach(function(r) {
    if (!r.active) {
      r.nextSpawn -= 1 / 30;
      if (r.nextSpawn <= 0) {
        // Activate this ring
        r.active   = true;
        r.age      = 0;
        r.baseX    = (Math.random() - 0.5) * 22;
        r.baseZ    = camera.position.z - (5 + Math.random() * 50);
        r.mesh.position.set(r.baseX, -2.18, r.baseZ);
        r.mesh.scale.setScalar(0.1);
        r.mesh.material.opacity = 0.55;
        r.nextSpawn = 2.5 + Math.random() * 4;
      }
    } else {
      r.age += 1 / 30;
      const prog = r.age / r.maxAge;
      r.mesh.scale.setScalar(0.1 + prog * 2.8);
      r.mesh.material.opacity = 0.55 * (1 - prog);
      if (r.age >= r.maxAge) r.active = false;
    }
  });

  // Caustic blobs
  md.caustics.material.opacity = Math.max(0, 0.5 + Math.sin(t * 0.7) * 0.32);
  for (let i = 0; i < CAUSTICS; i++) {
    const d = cData[i];
    cPos[i*3]   = d.baseX + Math.sin(t * d.freq + d.phase) * 0.6
                           + Math.cos(t * d.freq * 0.7 + d.phase) * 0.32;
    cPos[i*3+1] = -2.1 + Math.sin(t * 1.2 + d.phase) * 0.035;
    cPos[i*3+2] = d.baseZ + camera.position.z + 60;
    if (cPos[i*3+2] > camera.position.z + 8) d.baseZ -= 125;
  }
  md.caustics.geometry.attributes.position.needsUpdate = true;

  // Canopy sway
  md.canopy.forEach(function(c) {
    c.mesh.rotation.z += Math.sin(t * 0.18 + c.phase) * 0.0004;
    c.mesh.position.z += speed * 0.35;
    if (c.mesh.position.z > camera.position.z + 5) c.mesh.position.z -= 73;
  });

  // [2] 3D trees scroll forward
  md.trees3D.forEach(function(tree) {
    tree.trunk.position.z += speed * 0.3;
    tree.foliage.forEach(function(f) { f.position.z += speed * 0.3; });
    if (tree.trunk.position.z > camera.position.z + 5) {
      const shift = 74;
      tree.trunk.position.z -= shift;
      tree.foliage.forEach(function(f) { f.position.z -= shift; });
    }
  });

  // Light shafts
  shafts.forEach(function(s) {
    s.mesh.material.opacity = s.base * (0.65 + Math.sin(t * 0.25 + s.phase) * 0.35);
    s.mesh.position.z += speed * 0.45;
    if (s.mesh.position.z > camera.position.z + 6) s.mesh.position.z -= 70;
  });

  // Fine dust
  for (let i = 0; i < DUST; i++) {
    dPos[i*3]   += Math.sin(t * 0.35 + i * 0.7) * 0.003;
    dPos[i*3+1] += Math.cos(t * 0.28 + i * 0.5) * 0.002 + 0.0005;
    dPos[i*3+2] += speed * 0.55;
    if (dPos[i*3+2] > camera.position.z + 4) {
      dPos[i*3]   = (Math.random() - 0.5) * 28;
      dPos[i*3+1] = -1 + Math.random() * 9;
      dPos[i*3+2] = camera.position.z - 65;
    }
  }
  md.dust.geometry.attributes.position.needsUpdate = true;

  // Glowing spores
  md.spores.material.opacity = Math.max(0, 0.6 + Math.sin(t * 0.55) * 0.4);
  for (let i = 0; i < SPORES; i++) {
    const d = sData[i];
    sPos[i*3]   += d.drift + Math.sin(t * 0.3 + d.phase) * 0.005;
    sPos[i*3+1] += Math.sin(t * 0.22 + d.phase * 1.3) * 0.003 + 0.0008;
    sPos[i*3+2] += speed * 0.48;
    if (sPos[i*3+2] > camera.position.z + 4) {
      sPos[i*3]   = (Math.random() - 0.5) * 22;
      sPos[i*3+1] = -0.5 + Math.random() * 7;
      sPos[i*3+2] = camera.position.z - 62;
    }
  }
  md.spores.geometry.attributes.position.needsUpdate = true;

  // Fireflies
  md.flies.material.opacity = Math.max(0, 0.5 + Math.sin(t * 1.3) * 0.5);
  for (let i = 0; i < FLIES; i++) {
    fPos[i*3]   += Math.sin(t * 0.55 + i * 2.1) * 0.007;
    fPos[i*3+1] += Math.cos(t * 0.42 + i * 1.9) * 0.005;
    fPos[i*3+2] += speed * 0.45;
    if (fPos[i*3+2] > camera.position.z + 4) {
      fPos[i*3]   = (Math.random() - 0.5) * 22;
      fPos[i*3+1] = -1.5 + Math.random() * 4.5;
      fPos[i*3+2] = camera.position.z - 55;
    }
  }
  md.flies.geometry.attributes.position.needsUpdate = true;
}

function initOcean() {
  camera.position.set(0, 0, 0);
  camera.rotation.set(0, 0, 0);
  scene.fog = new THREE.FogExp2(0x000d1a, 0.016);
  renderer.setClearColor(0x000d1a, 1);

  // Background sphere — deep abyss
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(600, 16, 16),
    new THREE.MeshBasicMaterial({ color: 0x00060f, side: THREE.BackSide })
  ));

  // Surface light refraction — caustic shimmer high above
  const surfaceGeo = new THREE.PlaneGeometry(60, 60, 1, 1);
  surfaceGeo.rotateX(-Math.PI / 2);
  const surfaceMat = new THREE.MeshBasicMaterial({
    color: 0x0066aa, transparent: true, opacity: 0.08,
    side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending,
  });
  const surfaceMesh = new THREE.Mesh(surfaceGeo, surfaceMat);
  surfaceMesh.position.set(0, 12, -20);
  scene.add(surfaceMesh);

  // Light shafts from surface
  const shafts = [];
  for (let s = 0; s < 16; s++) {
    const h = 8 + Math.random() * 16;
    const geo = new THREE.CylinderGeometry(0.04, 0.6, h, 6, 1, true);
    const mat = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(0.55 + Math.random() * 0.08, 0.8, 0.55 + Math.random() * 0.2),
      transparent: true, opacity: 0,
      side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending,
    });
    const shaft = new THREE.Mesh(geo, mat);
    shaft.position.set((Math.random() - 0.5) * 28, 5 + Math.random() * 8, -(5 + Math.random() * 60));
    shaft.rotation.x = Math.PI;
    shaft.rotation.z = (Math.random() - 0.5) * 0.25;
    scene.add(shaft);
    shafts.push({ mesh: shaft, phase: Math.random() * Math.PI * 2, base: 0.04 + Math.random() * 0.08 });
  }

  // Caustic light blobs on a floor plane below
  const CAUSTICS = 50;
  const cPos = new Float32Array(CAUSTICS * 3);
  const cCol = new Float32Array(CAUSTICS * 3);
  const cData = [];
  for (let i = 0; i < CAUSTICS; i++) {
    cPos[i*3] = (Math.random() - 0.5) * 30;
    cPos[i*3+1] = -5 + Math.random() * 0.3;
    cPos[i*3+2] = -(Math.random() * 70);
    const b = 0.5 + Math.random() * 0.5;
    cCol[i*3] = b * 0.1; cCol[i*3+1] = b * 0.6; cCol[i*3+2] = b * 0.9;
    cData.push({ bx: cPos[i*3], bz: cPos[i*3+2], phase: Math.random() * Math.PI * 2, freq: 0.3 + Math.random() * 0.4 });
  }
  const cGeo = new THREE.BufferGeometry();
  cGeo.setAttribute('position', new THREE.BufferAttribute(cPos, 3));
  cGeo.setAttribute('color',    new THREE.BufferAttribute(cCol, 3));
  const caustics = new THREE.Points(cGeo, new THREE.PointsMaterial({
    size: 0.5, vertexColors: true, transparent: true, opacity: 0,
    depthWrite: false, blending: THREE.AdditiveBlending,
  }));
  scene.add(caustics);

  // Bubbles rising
  const BUBBLES = 600;
  const bPos = new Float32Array(BUBBLES * 3);
  const bSpeeds = new Float32Array(BUBBLES);
  for (let i = 0; i < BUBBLES; i++) {
    bPos[i*3]   = (Math.random() - 0.5) * 30;
    bPos[i*3+1] = (Math.random() - 0.5) * 20;
    bPos[i*3+2] = -(Math.random() * 65);
    bSpeeds[i]  = 0.015 + Math.random() * 0.035;
  }
  const bGeo = new THREE.BufferGeometry();
  bGeo.setAttribute('position', new THREE.BufferAttribute(bPos, 3));
  const bubbles = new THREE.Points(bGeo, new THREE.PointsMaterial({
    color: 0xaaddff, size: 0.1, transparent: true, opacity: 0.45,
    depthWrite: false, blending: THREE.AdditiveBlending,
  }));
  scene.add(bubbles);

  // Bioluminescent particles — blue-green glow
  const BIOL = 1800;
  const blPos = new Float32Array(BIOL * 3);
  const blCol = new Float32Array(BIOL * 3);
  const blData = [];
  for (let i = 0; i < BIOL; i++) {
    blPos[i*3]   = (Math.random() - 0.5) * 32;
    blPos[i*3+1] = (Math.random() - 0.5) * 18;
    blPos[i*3+2] = -(Math.random() * 68);
    const hue = 0.48 + Math.random() * 0.18; // blue-cyan-teal
    const c = new THREE.Color().setHSL(hue, 1.0, 0.65);
    blCol[i*3] = c.r; blCol[i*3+1] = c.g; blCol[i*3+2] = c.b;
    blData.push({ phase: Math.random() * Math.PI * 2, freq: 0.5 + Math.random() * 1.5 });
  }
  const blGeo = new THREE.BufferGeometry();
  blGeo.setAttribute('position', new THREE.BufferAttribute(blPos, 3));
  blGeo.setAttribute('color',    new THREE.BufferAttribute(blCol, 3));
  const biolum = new THREE.Points(blGeo, new THREE.PointsMaterial({
    size: 0.18, vertexColors: true, transparent: true, opacity: 0,
    depthWrite: false, blending: THREE.AdditiveBlending,
  }));
  scene.add(biolum);

  // Jellyfish — torus + trailing lines
  const jellies = [];
  for (let j = 0; j < 14; j++) {
    const hue = 0.5 + Math.random() * 0.25;
    const bellGeo = new THREE.TorusGeometry(0.55 + Math.random() * 0.35, 0.12, 8, 28);
    const bellMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(hue, 0.9, 0.65),
      transparent: true, opacity: 0.55, depthWrite: false, blending: THREE.AdditiveBlending,
    });
    const bell = new THREE.Mesh(bellGeo, bellMat);
    bell.rotation.x = Math.PI / 2;

    // Trailing tentacles as line segments
    const tentCount = 8;
    const tPos = new Float32Array(tentCount * 2 * 3);
    for (let k = 0; k < tentCount; k++) {
      const a = (k / tentCount) * Math.PI * 2;
      const r = 0.45;
      tPos[k*6]   = Math.cos(a) * r; tPos[k*6+1]   = 0;            tPos[k*6+2]   = Math.sin(a) * r;
      tPos[k*6+3] = Math.cos(a) * r * 0.4; tPos[k*6+4] = -(0.8 + Math.random() * 1.2); tPos[k*6+5] = Math.sin(a) * r * 0.4;
    }
    const tGeo = new THREE.BufferGeometry();
    tGeo.setAttribute('position', new THREE.BufferAttribute(tPos, 3));
    const tentacles = new THREE.LineSegments(tGeo, new THREE.LineBasicMaterial({
      color: new THREE.Color().setHSL(hue, 0.8, 0.75),
      transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending,
    }));

    const group = new THREE.Group();
    group.add(bell);
    group.add(tentacles);
    group.position.set(
      (Math.random() - 0.5) * 22,
      -2 + Math.random() * 8,
      -(4 + Math.random() * 58)
    );
    scene.add(group);
    jellies.push({ group, phase: Math.random() * Math.PI * 2, speed: 0.008 + Math.random() * 0.01, hue });
  }

  md.shafts   = shafts;
  md.caustics = caustics; md.cPos = cPos; md.cData = cData; md.CAUSTICS = CAUSTICS;
  md.bubbles  = bubbles;  md.bPos = bPos; md.bSpeeds = bSpeeds; md.BUBBLES = BUBBLES;
  md.biolum   = biolum;   md.blPos = blPos; md.blData = blData; md.BIOL = BIOL;
  md.jellies  = jellies;
  md.surfaceMesh = surfaceMesh;
  md.camZ     = 0;
}

function updateOcean(t) {
  const { bPos, bSpeeds, BUBBLES, blPos, blData, BIOL, cPos, cData, CAUSTICS } = md;
  const speed = 0.028;

  md.camZ -= speed;
  camera.position.z = md.camZ;
  camera.position.x += (mouseNX * 1.8 - camera.position.x) * 0.016;
  camera.position.y += (-mouseNY * 1.2 - camera.position.y) * 0.016;
  camera.lookAt(camera.position.x * 0.1, camera.position.y * 0.1, camera.position.z - 10);

  // Surface shimmer
  md.surfaceMesh.position.z = camera.position.z - 20;
  md.surfaceMesh.material.opacity = 0.06 + Math.sin(t * 0.8) * 0.03;

  // Light shafts
  md.shafts.forEach(function(s) {
    s.mesh.material.opacity = s.base * (0.6 + Math.sin(t * 0.3 + s.phase) * 0.4);
    s.mesh.position.z += speed * 0.5;
    if (s.mesh.position.z > camera.position.z + 6) s.mesh.position.z -= 68;
  });

  // Caustics
  md.caustics.material.opacity = Math.max(0, 0.45 + Math.sin(t * 0.6) * 0.3);
  for (let i = 0; i < CAUSTICS; i++) {
    const d = cData[i];
    cPos[i*3]   = d.bx + Math.sin(t * d.freq + d.phase) * 0.5;
    cPos[i*3+2] = d.bz + camera.position.z + 70;
    if (cPos[i*3+2] > camera.position.z + 8) d.bz -= 78;
  }
  md.caustics.geometry.attributes.position.needsUpdate = true;

  // Bubbles rise
  for (let i = 0; i < BUBBLES; i++) {
    bPos[i*3]   += Math.sin(t * 0.4 + i * 1.3) * 0.003;
    bPos[i*3+1] += bSpeeds[i];
    bPos[i*3+2] += speed * 0.4;
    if (bPos[i*3+1] > camera.position.y + 14 || bPos[i*3+2] > camera.position.z + 5) {
      bPos[i*3]   = (Math.random() - 0.5) * 30;
      bPos[i*3+1] = camera.position.y - 12;
      bPos[i*3+2] = camera.position.z - 65;
    }
  }
  md.bubbles.geometry.attributes.position.needsUpdate = true;

  // Bioluminescence pulses per-particle
  let avgOpacity = 0;
  for (let i = 0; i < BIOL; i++) {
    blPos[i*3]   += Math.sin(t * 0.25 + i * 0.9) * 0.002;
    blPos[i*3+1] += Math.cos(t * 0.2 + i * 0.7) * 0.002;
    blPos[i*3+2] += speed * 0.5;
    if (blPos[i*3+2] > camera.position.z + 5) {
      blPos[i*3]   = (Math.random() - 0.5) * 32;
      blPos[i*3+1] = (Math.random() - 0.5) * 18;
      blPos[i*3+2] = camera.position.z - 68;
    }
  }
  md.biolum.geometry.attributes.position.needsUpdate = true;
  md.biolum.material.opacity = Math.max(0, 0.55 + Math.sin(t * 0.4) * 0.45);

  // Jellyfish pulse and drift
  md.jellies.forEach(function(j) {
    const pulse = 0.85 + Math.sin(t * 1.1 + j.phase) * 0.18;
    j.group.scale.set(pulse, pulse, pulse);
    j.group.position.y  += Math.sin(t * j.speed * 6 + j.phase) * 0.006;
    j.group.position.x  += Math.sin(t * j.speed * 3 + j.phase * 0.7) * 0.003;
    j.group.position.z  += speed * 0.55;
    j.group.rotation.y  += 0.005;
    if (j.group.position.z > camera.position.z + 6) j.group.position.z -= 66;
  });
}

// ============================================================
// MODE 6 — AURORA
// ============================================================

function initAurora() {
  camera.position.set(0, 2, 0);
  camera.rotation.set(0, 0, 0);
  scene.fog = new THREE.FogExp2(0x000510, 0.008);
  renderer.setClearColor(0x000510, 1);

  // Star field
  const STARS = 5000;
  const sPos = new Float32Array(STARS * 3);
  for (let i = 0; i < STARS; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r     = 300 + Math.random() * 150;
    sPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    sPos[i*3+1] = Math.abs(r * Math.sin(phi) * Math.sin(theta)); // upper hemisphere
    sPos[i*3+2] = r * Math.cos(phi);
  }
  const sGeo = new THREE.BufferGeometry();
  sGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
  scene.add(new THREE.Points(sGeo, new THREE.PointsMaterial({
    color: 0xffffff, size: 0.55, transparent: true, opacity: 0.7,
  })));

  // Tundra silhouette — dark ground plane
  const groundGeo = new THREE.PlaneGeometry(500, 500);
  groundGeo.rotateX(-Math.PI / 2);
  scene.add(new THREE.Mesh(groundGeo, new THREE.MeshBasicMaterial({ color: 0x000308 })));

  // Aurora curtains — tall skinny planes with vertex colors
  const curtains = [];
  const curtainHues = [0.38, 0.48, 0.75, 0.55, 0.42]; // green, cyan, violet, teal, green

  for (let c = 0; c < 18; c++) {
    const W = 12 + Math.random() * 20;
    const H = 18 + Math.random() * 28;
    const segsW = 12, segsH = 24;
    const geo = new THREE.PlaneGeometry(W, H, segsW, segsH);
    geo.rotateX(Math.PI / 2);

    // Per-vertex alpha — bright at top, fade to zero at bottom
    const posArr = geo.attributes.position.array;
    const vCount = posArr.length / 3;
    const colors = new Float32Array(vCount * 3);
    const hue = curtainHues[c % curtainHues.length] + (Math.random() - 0.5) * 0.08;
    for (let v = 0; v < vCount; v++) {
      const y   = posArr[v*3+2]; // z is up after rotate
      const pct = (y + H / 2) / H; // 0 at bottom, 1 at top
      const col = new THREE.Color().setHSL(hue, 1.0, 0.55 + pct * 0.3);
      colors[v*3] = col.r * pct; colors[v*3+1] = col.g * pct; colors[v*3+2] = col.b * pct;
    }
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const mat = new THREE.MeshBasicMaterial({
      vertexColors: true, transparent: true, opacity: 0.0,
      side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending,
    });
    const curtain = new THREE.Mesh(geo, mat);
    curtain.position.set(
      (Math.random() - 0.5) * 120,
      H / 2 + 5,
      -(20 + Math.random() * 180)
    );
    curtain.rotation.y = (Math.random() - 0.5) * 0.4;
    scene.add(curtain);
    curtains.push({
      mesh: curtain, phase: Math.random() * Math.PI * 2,
      hue, H, segsW, segsH, W,
      waveSpeed: 0.18 + Math.random() * 0.22,
      baseOpacity: 0.35 + Math.random() * 0.45,
    });
  }

  // Shimmer particles — drifting light motes
  const MOTES = 1200;
  const mPos = new Float32Array(MOTES * 3);
  const mCol = new Float32Array(MOTES * 3);
  for (let i = 0; i < MOTES; i++) {
    mPos[i*3]   = (Math.random() - 0.5) * 100;
    mPos[i*3+1] = 4 + Math.random() * 35;
    mPos[i*3+2] = -(Math.random() * 200);
    const hue = 0.38 + Math.random() * 0.38;
    const c = new THREE.Color().setHSL(hue, 1, 0.7);
    mCol[i*3] = c.r; mCol[i*3+1] = c.g; mCol[i*3+2] = c.b;
  }
  const mGeo = new THREE.BufferGeometry();
  mGeo.setAttribute('position', new THREE.BufferAttribute(mPos, 3));
  mGeo.setAttribute('color',    new THREE.BufferAttribute(mCol, 3));
  const motes = new THREE.Points(mGeo, new THREE.PointsMaterial({
    size: 0.22, vertexColors: true, transparent: true, opacity: 0.5,
    depthWrite: false, blending: THREE.AdditiveBlending,
  }));
  scene.add(motes);

  md.curtains = curtains;
  md.motes    = motes; md.mPos = mPos; md.MOTES = MOTES;
  md.camZ     = 0;
}

function updateAurora(t) {
  const { mPos, MOTES } = md;
  const speed = 0.018;

  md.camZ -= speed;
  camera.position.z = md.camZ;
  camera.position.x += (mouseNX * 3 - camera.position.x) * 0.012;
  camera.position.y += (2 - mouseNY * 1.5 - camera.position.y) * 0.012;
  camera.lookAt(camera.position.x * 0.08, 8, camera.position.z - 15);

  // Curtains wave and breathe
  md.curtains.forEach(function(c) {
    // Opacity pulse — curtains fade in and out slowly
    c.mesh.material.opacity = c.baseOpacity * (0.6 + Math.sin(t * 0.22 + c.phase) * 0.4);

    // Wave vertex positions — ripple effect along curtain width
    const pos = c.mesh.geometry.attributes.position.array;
    const cols = c.mesh.geometry.attributes.color.array;
    const vCount = pos.length / 3;
    for (let v = 0; v < vCount; v++) {
      const origX = ((v % (c.segsW + 1)) / c.segsW - 0.5) * c.W;
      const pct   = (pos[v*3+2] + c.H / 2) / c.H;
      // Horizontal ripple — more at top, less at bottom
      pos[v*3] = origX + Math.sin(t * c.waveSpeed + origX * 0.15 + c.phase) * pct * 2.2
                       + Math.sin(t * c.waveSpeed * 0.6 + origX * 0.08 + c.phase * 1.4) * pct * 1.2;
      // Color shimmer — hue shifts slightly over time
      const shiftHue = (c.hue + Math.sin(t * 0.12 + c.phase) * 0.06 + (origX / c.W) * 0.1 + 1) % 1;
      const col = new THREE.Color().setHSL(shiftHue, 1.0, 0.55 + pct * 0.3);
      cols[v*3] = col.r * pct; cols[v*3+1] = col.g * pct; cols[v*3+2] = col.b * pct;
    }
    c.mesh.geometry.attributes.position.needsUpdate = true;
    c.mesh.geometry.attributes.color.needsUpdate    = true;

    c.mesh.position.z += speed * 0.3;
    if (c.mesh.position.z > camera.position.z + 10) c.mesh.position.z -= 205;
  });

  // Shimmer motes drift
  for (let i = 0; i < MOTES; i++) {
    mPos[i*3]   += Math.sin(t * 0.3 + i * 0.8) * 0.005;
    mPos[i*3+1] += Math.cos(t * 0.22 + i * 0.6) * 0.003;
    mPos[i*3+2] += speed * 0.5;
    if (mPos[i*3+2] > camera.position.z + 8) {
      mPos[i*3]   = (Math.random() - 0.5) * 100;
      mPos[i*3+1] = 4 + Math.random() * 35;
      mPos[i*3+2] = camera.position.z - 200;
    }
  }
  md.motes.geometry.attributes.position.needsUpdate = true;
}

// ============================================================
// MODE 7 — SACRED GEOMETRY
// ============================================================

function initSacred() {
  camera.position.set(0, 0, 22);
  camera.lookAt(0, 0, 0);
  scene.fog = new THREE.FogExp2(0x050008, 0.022);
  renderer.setClearColor(0x050008, 1);

  // Nested Platonic solids
  const solids = [];
  const solidDefs = [
    { geo: new THREE.IcosahedronGeometry(3.5, 0),  hue: 0.72, speed: 0.18 },
    { geo: new THREE.DodecahedronGeometry(5.2, 0), hue: 0.55, speed: -0.12 },
    { geo: new THREE.OctahedronGeometry(7.0, 0),   hue: 0.38, speed: 0.09 },
    { geo: new THREE.TetrahedronGeometry(8.8, 0),  hue: 0.85, speed: -0.07 },
    { geo: new THREE.IcosahedronGeometry(10.5, 0), hue: 0.62, speed: 0.05 },
  ];

  solidDefs.forEach(function(def, i) {
    // Wireframe shell
    const wireMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(def.hue, 1.0, 0.65),
      wireframe: true, transparent: true, opacity: 0.55,
      depthWrite: false, blending: THREE.AdditiveBlending,
    });
    const wire = new THREE.Mesh(def.geo, wireMat);

    // Faint face fill
    const fillMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(def.hue, 0.8, 0.3),
      transparent: true, opacity: 0.04,
      side: THREE.DoubleSide, depthWrite: false,
    });
    const fill = new THREE.Mesh(def.geo, fillMat);

    scene.add(wire);
    scene.add(fill);
    solids.push({ wire, fill, hue: def.hue, speed: def.speed, phase: i * 1.25 });
  });

  // Connecting lines — edges between solid vertices
  const lineGroups = [];
  for (let lg = 0; lg < 3; lg++) {
    const COUNT = 60;
    const lPos  = new Float32Array(COUNT * 2 * 3);
    const r1    = 3.5 + lg * 3.5;
    const r2    = r1 + 1.8;
    const hue   = (0.6 + lg * 0.2) % 1;
    for (let l = 0; l < COUNT; l++) {
      const a1 = Math.random() * Math.PI * 2;
      const a2 = Math.random() * Math.PI * 2;
      const p1 = { x: Math.sin(a1) * r1, y: Math.cos(a1) * Math.sin(a2) * r1, z: Math.cos(a1) * r1 };
      const p2 = { x: Math.sin(a2) * r2, y: Math.cos(a2) * Math.sin(a1) * r2, z: Math.cos(a2) * r2 };
      lPos[l*6]   = p1.x; lPos[l*6+1] = p1.y; lPos[l*6+2] = p1.z;
      lPos[l*6+3] = p2.x; lPos[l*6+4] = p2.y; lPos[l*6+5] = p2.z;
    }
    const lGeo = new THREE.BufferGeometry();
    lGeo.setAttribute('position', new THREE.BufferAttribute(lPos, 3));
    const lines = new THREE.LineSegments(lGeo, new THREE.LineBasicMaterial({
      color: new THREE.Color().setHSL(hue, 1, 0.7),
      transparent: true, opacity: 0.18,
      blending: THREE.AdditiveBlending,
    }));
    scene.add(lines);
    lineGroups.push({ lines, speed: 0.06 + lg * 0.04, phase: lg * 2.1 });
  }

  // Orbiting node particles
  const NODES = 280;
  const nPos  = new Float32Array(NODES * 3);
  const nCol  = new Float32Array(NODES * 3);
  const nData = [];
  for (let i = 0; i < NODES; i++) {
    const r     = 2 + Math.random() * 10;
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    nPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    nPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    nPos[i*3+2] = r * Math.cos(phi);
    const hue = Math.random();
    const c   = new THREE.Color().setHSL(hue, 1.0, 0.72);
    nCol[i*3]   = c.r; nCol[i*3+1] = c.g; nCol[i*3+2] = c.b;
    nData.push({ r, theta, phi, phaseTheta: Math.random() * Math.PI * 2, speed: 0.12 + Math.random() * 0.25 });
  }
  const nGeo = new THREE.BufferGeometry();
  nGeo.setAttribute('position', new THREE.BufferAttribute(nPos, 3));
  nGeo.setAttribute('color',    new THREE.BufferAttribute(nCol, 3));
  const nodes = new THREE.Points(nGeo, new THREE.PointsMaterial({
    size: 0.14, vertexColors: true, transparent: true, opacity: 0.75,
    depthWrite: false, blending: THREE.AdditiveBlending,
  }));
  scene.add(nodes);

  // Pulsing center bloom sphere
  const bloom = new THREE.Mesh(
    new THREE.SphereGeometry(0.55, 16, 16),
    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending })
  );
  scene.add(bloom);

  md.solids     = solids;
  md.lineGroups = lineGroups;
  md.nodes      = nodes; md.nPos = nPos; md.nData = nData; md.NODES = NODES;
  md.bloom      = bloom;
  md.orbitAngle = 0;
}

function updateSacred(t) {
  const { nPos, nData, NODES } = md;

  // Slow camera orbit + mouse influence
  md.orbitAngle += 0.004;
  const camR = 22 + Math.sin(t * 0.12) * 4;
  camera.position.set(
    Math.cos(md.orbitAngle) * camR + mouseNX * 3,
    Math.sin(t * 0.08) * 5  + mouseNY * 3,
    Math.sin(md.orbitAngle) * camR
  );
  camera.lookAt(0, 0, 0);

  // Rotate each solid on independent axes
  md.solids.forEach(function(s) {
    s.wire.rotation.x = t * s.speed * 0.7 + s.phase;
    s.wire.rotation.y = t * s.speed       + s.phase * 0.6;
    s.wire.rotation.z = t * s.speed * 0.4;
    s.fill.rotation.copy(s.wire.rotation);

    // Color breathe
    const shift = (s.hue + Math.sin(t * 0.1 + s.phase) * 0.12 + 1) % 1;
    s.wire.material.color.setHSL(shift, 1.0, 0.65);
    s.fill.material.color.setHSL(shift, 0.8, 0.3);
    s.wire.material.opacity = 0.42 + Math.sin(t * 0.3 + s.phase) * 0.18;
  });

  // Rotate line groups
  md.lineGroups.forEach(function(lg) {
    lg.lines.rotation.y = t * lg.speed + lg.phase;
    lg.lines.rotation.x = t * lg.speed * 0.55;
  });

  // Nodes orbit spherically
  for (let i = 0; i < NODES; i++) {
    const d = nData[i];
    d.phaseTheta += d.speed * 0.012;
    const theta = d.theta + d.phaseTheta;
    nPos[i*3]   = d.r * Math.sin(d.phi) * Math.cos(theta);
    nPos[i*3+1] = d.r * Math.sin(d.phi) * Math.sin(theta);
    nPos[i*3+2] = d.r * Math.cos(d.phi);
  }
  md.nodes.geometry.attributes.position.needsUpdate = true;

  // Center bloom pulse
  const bloomScale = 0.7 + Math.sin(t * 1.4) * 0.4;
  md.bloom.scale.setScalar(bloomScale);
  md.bloom.material.opacity = 0.6 + Math.sin(t * 1.4) * 0.35;
}



document.querySelectorAll('.mode-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.mode-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    switchMode(btn.dataset.mode);
  });
});

pulseToggleEl.style.display = 'flex';
createScene();
initWarp();
loop();
